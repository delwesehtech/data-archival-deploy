version: "1.0"

delete_scope: cleanup_archive
days_before_delete: 10

# Paths must exist inside the container; with 1:1 mounts they match ARCHIVE_PATH in .env (see .env.example).
paths:
  - "/tmp/wgbs_global2/crick"

file_patterns:
  include:
    - "*.bam"
    - "*.bam.gz"
    - "*.bai"
    - "*.bai.gz"
    - "*.sam"
    - "*.sam.gz"
    - "*.fastq"
    - "*.fastq.gz"
    - "*.vdjca"
    - "*trim*.clc"
  exclude: []

exclusions:
  always_exclude_paths: []
  critical_folders: []
  per_dataset_hold: []
