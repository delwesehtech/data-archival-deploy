version: "1.0"

# Paths should live under LOCAL_SCRATCH_PATH from .env (same path on host and in container).
delete_scope: cleanup_scratch
days_before_delete: 2

paths:
  - "/tmp/wgbs/crick"

file_patterns:
  include:
    - "*.bam"
    - "*.bam.gz"
    - "*.bai"
    - "*.bai.gz"
    - "*.sam"
    - "*.sam.gz"
    - "*.fastq"
    - "*.fastq.gz"
    - "*.vdjca"
    - "*trim*.clc"
  exclude: []

exclusions:
  always_exclude_paths: []
  critical_folders: []
  per_dataset_hold: []
