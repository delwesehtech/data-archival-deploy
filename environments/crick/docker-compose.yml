# pull_policy: missing — use local image or pull once from registry after docker login.
# (always would try Docker Hub for bare image names and fail.)
services:
  archival:
    image: ${IMAGE_NAME:?set IMAGE_NAME in .env}:${IMAGE_TAG:?set IMAGE_TAG in .env}
    pull_policy: missing
    volumes:
      - ./archive_policy.yaml:/policy/archive_policy.yaml:ro
      - ./logs:/app/logs
      - ${SCRATCH_PATH:?set SCRATCH_PATH in .env}:/scratch:ro
      - ${ARCHIVE_PATH:?set ARCHIVE_PATH in .env}:/archive
    environment:
      - PYTHONPATH=/app
      - ARCHIVE_POLICY_PATH=/policy/archive_policy.yaml
    command: ["--dry-run", "--log-dir", "/app/logs"]

  cleanup:
    image: ${IMAGE_NAME:?set IMAGE_NAME in .env}:${IMAGE_TAG:?set IMAGE_TAG in .env}
    pull_policy: missing
    entrypoint: ["python", "-m", "engine.delete_run"]
    volumes:
      - ./cleanup_policy.yaml:/policy/cleanup_policy.yaml:ro
      - ./logs:/app/logs
      - ${SCRATCH_PATH:?set SCRATCH_PATH in .env}:/scratch
    environment:
      - PYTHONPATH=/app
      - CLEANUP_POLICY_PATH=/policy/cleanup_policy.yaml
    command: ["--dry-run", "--log-dir", "/app/logs"]

  visibility:
    image: ${IMAGE_NAME:?set IMAGE_NAME in .env}:${IMAGE_TAG:?set IMAGE_TAG in .env}
    pull_policy: missing
    entrypoint: ["python", "-m", "visibility.api"]
    volumes:
      - ./logs:/app/logs:ro
    environment:
      - PYTHONPATH=/app
      - SERVER_NAME=${SERVER_NAME:-}
    command: ["--port", "8080", "--log-dir", "/app/logs"]
    ports:
      - "8080:8080"
    restart: unless-stopped
