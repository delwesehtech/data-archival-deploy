# pull_policy: missing — use local image or pull once from registry after docker login.
# (always would try Docker Hub for bare image names and fail.)
#
# Three operations per server (separate compose services / policies):
#   1) cleanup_scratch    — delete old files on scratch (SCRATCH_PATH)
#   2) cleanup_archive — delete old files on archive drive (ARCHIVE_PATH)
#   3) archival           — copy/move data for scratch → archive drive (policy/archive_policy.yaml)
#
# Bind mounts use the same path on host and in the container (SCRATCH_PATH, ARCHIVE_PATH in .env).
# Policy paths must match those locations.
services:
  archival:
    image: ${IMAGE_NAME:?set IMAGE_NAME in .env}:${IMAGE_TAG:?set IMAGE_TAG in .env}
    pull_policy: missing
    volumes:
      - ./policy:/policy:ro
      - ./logs:/app/logs
      - ${SCRATCH_PATH:?set SCRATCH_PATH in .env}:${SCRATCH_PATH:?set SCRATCH_PATH in .env}:ro
      - ${ARCHIVE_PATH:?set ARCHIVE_PATH in .env}:${ARCHIVE_PATH:?set ARCHIVE_PATH in .env}
    environment:
      - PYTHONPATH=/app
      - ARCHIVE_POLICY_PATH=/policy/archive_policy.yaml
    command: ["--dry-run", "--log-dir", "/app/logs"]

  cleanup_scratch:
    image: ${IMAGE_NAME:?set IMAGE_NAME in .env}:${IMAGE_TAG:?set IMAGE_TAG in .env}
    pull_policy: missing
    entrypoint: ["python", "-m", "engine.delete_run"]
    volumes:
      - ./policy:/policy:ro
      - ./logs:/app/logs
      - ${SCRATCH_PATH:?set SCRATCH_PATH in .env}:${SCRATCH_PATH:?set SCRATCH_PATH in .env}
    environment:
      - PYTHONPATH=/app
      - CLEANUP_POLICY_PATH=/policy/cleanup_policy_scratch.yaml
      - CLEANUP_OPERATION=cleanup_scratch
    command: ["--dry-run", "--log-dir", "/app/logs"]

  cleanup_archive:
    image: ${IMAGE_NAME:?set IMAGE_NAME in .env}:${IMAGE_TAG:?set IMAGE_TAG in .env}
    pull_policy: missing
    entrypoint: ["python", "-m", "engine.delete_run"]
    volumes:
      - ./policy:/policy:ro
      - ./logs:/app/logs
      - ${ARCHIVE_PATH:?set ARCHIVE_PATH in .env}:${ARCHIVE_PATH:?set ARCHIVE_PATH in .env}
    environment:
      - PYTHONPATH=/app
      - CLEANUP_POLICY_PATH=/policy/cleanup_policy_archive_drive.yaml
      - CLEANUP_OPERATION=cleanup_archive
    command: ["--dry-run", "--log-dir", "/app/logs"]

  visibility:
    image: ${IMAGE_NAME:?set IMAGE_NAME in .env}:${IMAGE_TAG:?set IMAGE_TAG in .env}
    pull_policy: missing
    entrypoint: ["python", "-m", "visibility.api"]
    volumes:
      - ./logs:/app/logs:ro
    environment:
      - PYTHONPATH=/app
      - SERVER_NAME=${SERVER_NAME:-}
      - SCRATCH_PATH=${SCRATCH_PATH:-}
      - ARCHIVE_PATH=${ARCHIVE_PATH:-}
    command: ["--port", "8080", "--log-dir", "/app/logs"]
    ports:
      - "8080:8080"
    restart: unless-stopped
