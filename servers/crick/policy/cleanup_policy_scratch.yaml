version: "1.0"

# Paths must exist inside the container; with 1:1 mounts they match SCRATCH_PATH in .env (see .env.example).
delete_scope: cleanup_scratch
days_before_delete: 60

paths:
  - "/wgbs/scratch/kpadmanabhan"

file_patterns:
  include:
    - "*.bam"
    - "*.bam.gz"
    - "*.bai"
    - "*.bai.gz"
    - "*.sam"
    - "*.sam.gz"
    #- "*.fastq"
    #- "*.fastq.gz" this is excluded temporarily . reauested by user
    - "*.vdjca"
    - "*trim*.clc"
  exclude: []

# Exclusions: same semantics as archive_policy (see data-archival config/schema.yaml).
# Host paths /share/BeadBarcodeDatabase, /share/Caspio, /share/TileIndexingReportDatabase → relative share/<name> when scan root is above share/.
exclusions:
  always_exclude_paths:
    - share/BeadBarcodeDatabase
    - share/Caspio
    - share/TileIndexingReportDatabase
  critical_folders:
    - BeadBarcodeDatabase
    - Caspio
    - TileIndexingReportDatabase
  # Director-approved holds (dataset id or path substring).
  per_dataset_hold: []
