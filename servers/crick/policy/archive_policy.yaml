# Archival policy (crick) — scan the archive drive; eligible files upload to S3 Glacier (Deep Archive by default).
version: "1.0"

retention_defaults:
  # days_on_local_archive: mtime age on the archive drive before upload to S3 Glacier.
  days_on_local_archive: 365

data_scope:
  archival_aws:
    type: local_archive
    hosts: [crick]
    paths:
      - "/wgbs_global2/crick/kpadmanabhan"
    glacier_destination:
      bucket: REPLACE_WITH_YOUR_GLACIER_ARCHIVE_BUCKET
      prefix: crick
      storage_class: DEEP_ARCHIVE
    file_patterns:
      include:
        - "*.tiff"
        - "*.bcl"
        - "*.fastq"
        - "*.fastq.gz"
        - "*.fast5"
        - "*.pod5"
        - "*.clc"
        - "*.bam"
        - "*.bai"
        - "*.sam"
        - "*.vdjca"
        - "*.gz"
        - "*.bgzf"
      exclude:
        - "*.xlsx"
        - "*.csv"
        - "*.pdf"
        - "*.html"
        - "*.rds"
        - "*.rda"
        - "*.RData"

# Exclusions: engine matches path substrings + prefix-under-root (see data-archival config/schema.yaml).
# Host paths /share/BeadBarcodeDatabase, /share/Caspio, /share/TileIndexingReportDatabase → relative share/<name> when scan root is above share/.
exclusions:
  always_exclude_paths:
    - share/BeadBarcodeDatabase
    - share/Caspio
    - share/TileIndexingReportDatabase
  critical_folders:
    - BeadBarcodeDatabase
    - Caspio
    - TileIndexingReportDatabase
  per_dataset_hold: []
