# Archival policy (crick)
version: "1.0"

retention_defaults:
  days_on_scratch: 180
  days_on_local_archive: 365
  days_on_cloud_archive: null

data_scope:
  local_scratch:
    type: local_scratch
    hosts: [crick]
    paths: ["/tmp/wgbs/crick"]
    archive_path: "/tmp/wgbs_global2/crick"
    file_patterns:
      include:
        - "*.tiff"
        - "*.bcl"
        - "*.fastq"
        - "*.fastq.gz"
        - "*.fast5"
        - "*.pod5"
        - "*.clc"
        - "*.bam"
        - "*.bai"
        - "*.sam"
        - "*.vdjca"
        - "*.gz"
        - "*.bgzf"
      exclude:
        - "*.xlsx"
        - "*.csv"
        - "*.pdf"
        - "*.html"
        - "*.rds"
        - "*.rda"
        - "*.RData"

# Exclusions: engine matches path substrings + prefix-under-root (see data-archival config/schema.yaml).
exclusions:
  # Full roots never auto-archived/deleted (whole trees, e.g. external mounts). Do not duplicate paths in critical_folders.
  always_exclude_paths: []
  # Critical-area names or paths that appear inside many files; use always_exclude_paths for whole trees instead when possible.
  critical_folders: []
  # Director-approved dataset IDs or path fragments (holds); substring match only.
  per_dataset_hold: []
