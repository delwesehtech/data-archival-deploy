# Archival policy (watson1) — archive drive → S3 Glacier.
version: "1.0"

retention_defaults:
  days_on_local_archive: 365

data_scope:
  archival_aws:
    type: local_archive
    hosts: [watson1]
    paths:
      - "/tmp/wgbs_global2/watson1"
    glacier_destination:
      bucket: REPLACE_WITH_YOUR_GLACIER_ARCHIVE_BUCKET
      prefix: watson1
      storage_class: DEEP_ARCHIVE
    file_patterns:
      include:
        - "*.tiff"
        - "*.bcl"
        - "*.fastq"
        - "*.fastq.gz"
        - "*.fast5"
        - "*.pod5"
        - "*.clc"
        - "*.bam"
        - "*.bai"
        - "*.sam"
        - "*.vdjca"
        - "*.gz"
        - "*.bgzf"
      exclude:
        - "*.xlsx"
        - "*.csv"
        - "*.pdf"
        - "*.html"
        - "*.rds"
        - "*.rda"
        - "*.RData"

# Host paths /share/BeadBarcodeDatabase, /share/Caspio, /share/TileIndexingReportDatabase → relative share/<name> when scan root is above share/.
exclusions:
  always_exclude_paths:
    - share/BeadBarcodeDatabase
    - share/Caspio
    - share/TileIndexingReportDatabase
  critical_folders:
    - BeadBarcodeDatabase
    - Caspio
    - TileIndexingReportDatabase
  per_dataset_hold: []
