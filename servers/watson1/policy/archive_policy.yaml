# Archival policy (watson1) — archive drive → S3 Glacier.
version: "1.0"

retention_defaults:
  days_on_local_archive: 365
  days_on_scratch: 180
  days_on_cloud_archive: null

data_scope:
  archival_aws:
    type: local_archive
    hosts: [watson1]
    paths:
      - "/tmp/wgbs_global2/watson1"
    glacier_destination:
      bucket: REPLACE_WITH_YOUR_GLACIER_ARCHIVE_BUCKET
      prefix: watson1
      storage_class: DEEP_ARCHIVE
    file_patterns:
      include:
        - "*.tiff"
        - "*.bcl"
        - "*.fastq"
        - "*.fastq.gz"
        - "*.fast5"
        - "*.pod5"
        - "*.clc"
        - "*.bam"
        - "*.bai"
        - "*.sam"
        - "*.vdjca"
        - "*.gz"
        - "*.bgzf"
      exclude:
        - "*.xlsx"
        - "*.csv"
        - "*.pdf"
        - "*.html"
        - "*.rds"
        - "*.rda"
        - "*.RData"

exclusions:
  always_exclude_paths: []
  critical_folders: []
  per_dataset_hold: []
